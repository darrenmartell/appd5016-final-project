apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: seriescatalog-ingress
  namespace: seriescatalog
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: seriescatalog-api
                port:
                  number: 8080
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: seriescatalog-api
                port:
                  number: 8080
          - path: /users
            pathType: Prefix
            backend:
              service:
                name: seriescatalog-api
                port:
                  number: 8080
          - path: /series
            pathType: Prefix
            backend:
              service:
                name: seriescatalog-api
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: seriescatalog-frontend
                port:
                  number: 8080
