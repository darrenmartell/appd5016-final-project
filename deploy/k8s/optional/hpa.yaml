apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: seriescatalog-api
  namespace: seriescatalog
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: seriescatalog-api
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: seriescatalog-frontend
  namespace: seriescatalog
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: seriescatalog-frontend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
