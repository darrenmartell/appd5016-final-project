services:
  app:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.single
    container_name: series-catalog-single
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Mongo__ConnectionString=${MONGO_CONNECTION_STRING}
      - Mongo__DatabaseName=${MONGO_DATABASE_NAME:-series_catalog}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - series-catalog-network

networks:
  series-catalog-network:
    driver: bridge
