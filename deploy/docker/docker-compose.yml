services:
  api:
    build:
      context: ../../
      dockerfile: deploy/docker/api/Dockerfile
    container_name: appd-api
    ports:
      - "8081:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Mongo__ConnectionString: ${MONGO_CONNECTION_STRING}
      Mongo__DatabaseName: ${MONGO_DATABASE_NAME:-appd5016}

  frontend:
    build:
      context: ../../
      dockerfile: deploy/docker/frontend/Dockerfile
    container_name: appd-frontend
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    depends_on:
      - api
